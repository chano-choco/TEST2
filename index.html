<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>激動 Middle Rank</title>

<style>
/* ===== 全体 ===== */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    background: url("background.png") no-repeat center/cover fixed;
}

/* 暗いオーバーレイ */
.overlay {
    background: rgba(0,0,0,0.75);
    min-height: 100vh;
}

/* ===== ヘッダー ===== */
header {
    text-align: center;
    padding: 60px 20px;
}

header h1 {
    font-size: 3em;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #ff4655;
    text-shadow: 0 0 15px #ff4655;
}

header p {
    color: #aaa;
}

/* ===== セクション ===== */
section {
    max-width: 900px;
    margin: 30px auto;
    padding: 25px;
    background: rgba(20,20,30,0.85);
    border: 1px solid rgba(255,70,85,0.3);
    border-radius: 12px;

    animation: fadeIn 1s ease;
}

/* 見出し */
h2 {
    border-left: 4px solid #ff4655;
    padding-left: 10px;
}

/* ===== ボタン ===== */
.btn {
    display: inline-block;
    padding: 15px 30px;
    background: #ff4655;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 15px;

    box-shadow: 0 0 10px #ff4655;
    transition: 0.3s;
}

.btn:hover {
    background: #ff1e33;
    box-shadow: 0 0 20px #ff4655;
    transform: scale(1.05);
}

/* ===== タグ ===== */
.tag {
    display: inline-block;
    padding: 6px 12px;
    margin: 5px;
    background: #2563eb;
    border-radius: 6px;
}

/* ===== アニメーション ===== */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<div class="overlay">

<header>
